training:
  task: masked_language_modeling
  batch_size: 32
  max_steps: 6000
  learning_rate: 3.0e-4
  scheduler: cosine
  warmup_steps: 300
  weight_decay: 0.01
  seed: 42
  log_every: 100
  valid_every: 1000
  full_valid_every: 10000
  max_valid_batches: 64
  plot_every: 5000
  num_workers: 8
  pin_memory: true

data:
  split_mode: pragma_c
  train_split: train
  valid_split: valid

dataloader:
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  dynamic_batching: true
  token_budget: 32768
  max_batch_size: 16
  event_bucket_boundaries: [8, 16, 32, 64, 128, 256]

masking:
  token_mask_prob: 0.15
